<!<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFRICA UNCENSORED</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* HEADER */
header {
    background: #000;
    color: #fff;
    padding: 15px 20px;
}

header h1 {
    margin: 0;
    color: #e63946;
}

nav {
    margin-top: 10px;
}

nav a {
    color: #fff;
    margin-right: 15px;
    text-decoration: none;
    font-weight: bold;
    cursor: pointer;
}

nav a:hover {
    color: #e63946;
}

/* BREAKING */
.breaking {
    background: #e63946;
    color: white;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* LAYOUT */
.container {
    width: 90%;
    margin: auto;
    margin-top: 20px;
}

.main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}

/* ARTICLES */
.article {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

.article:hover {
    transform: scale(1.02);
}

.article img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.article h2 {
    margin: 10px 0;
}

/* SIDEBAR */
.sidebar {
    background: white;
    padding: 15px;
    border-radius: 5px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

/* BUTTON */
button {
    background: #e63946;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: black;
}

/* FOOTER */
.footer {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 20px;
}

/* MOBILE */
@media(max-width:768px){
    .main {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<header>
    <h1>AFRIKA UNCENSORED</h1>
    <nav>
        <a onclick="loadNews('all')">Home</a>
        <a onclick="loadNews('politics')">Politics</a>
        <a onclick="loadNews('business')">Business</a>
        <a onclick="loadNews('africa')">Africa</a>
        <a onclick="loadNews('opinion')">Opinion</a>
    </nav>
</header>

<div class="breaking">
BREAKING: Africa demands unity, accountability, and a new leadership vision
</div>

<div class="container">
    <div id="content"></div>
</div>

<div class="footer">
    <p>© 2026 AFRIKA UNCENSORED</p>
    <p>Founder: OLO SYLVESTER</p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCXyPkqXp-oRwat9hqDf4soOOfUX6K2NRA",
  authDomain: "africa-uncensored-ce663.firebaseapp.com",
  projectId: "africa-uncensored-ce663",
  storageBucket: "africa-uncensored-ce663.firebasestorage.app",
  messagingSenderId: "517087626869",
  appId: "1:517087626869:web:63bfec9fa1ad6deba75a3c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* LOAD NEWS WITH CATEGORY */
function loadNews(category="all"){
    const content = document.getElementById("content");

    db.collection("news").orderBy("time","desc").onSnapshot(snapshot=>{
        let html = `
        <div class="main">
            <div>
        `;

        snapshot.forEach(doc=>{
            let data = doc.data();

            if(category === "all" || data.category === category){
                html += `
                <div class="article" onclick="openArticle('${doc.id}')">
                    <img src="${data.image}">
                    <h2>${data.title}</h2>
                    <p>${data.content.substring(0,120)}...</p>
                    <button>Read More</button>
                </div>
                `;
            }
        });

        html += `
            </div>

            <div class="sidebar">
                <h3>Subscribe</h3>
                <p>Get updates directly to your inbox</p>
                <input type="email" placeholder="Enter your email">
                <button onclick="subscribe()">Subscribe</button>

                <h3>About</h3>
                <p>
                AFRICA UNCENSORED is a fearless Pan-African media platform
                focused on truth, leadership, and unity.
                </p>
            </div>
        </div>
        `;

        content.innerHTML = html;
    });
}

/* OPEN ARTICLE */
function openArticle(id){
    localStorage.setItem("articleId", id);
    window.location.href = "article.html";
}

/* SUBSCRIBE */
function subscribe(){
    alert("Subscribed successfully!");
}

/* LOAD DEFAULT */
loadNews();
</script>

</body>
</html>
